name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag, for example v1.0.0"
        required: true
        type: string
      publish_assets:
        description: "Create or update the GitHub release"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  validate-installer:
    name: Validate Committed Installer
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate.outputs.version }}
      installer_path: ${{ steps.validate.outputs.installer_path }}
      checksum_path: ${{ steps.validate.outputs.checksum_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate installer checksum
        id: validate
        shell: bash
        env:
          RELEASE_SOURCE: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}
        run: |
          set -euo pipefail
          if [[ "$RELEASE_SOURCE" =~ v?([0-9]+\.[0-9]+\.[0-9]+) ]]; then
            version="${BASH_REMATCH[1]}"
          else
            echo "Release source does not contain a semantic version: $RELEASE_SOURCE" >&2
            exit 1
          fi

          installer="release/ZoteroLinkerSetup-${version}.exe"
          checksum="${installer}.sha256"
          test -f "$installer"
          test -f "$checksum"

          expected="$(awk '{print tolower($1)}' "$checksum")"
          actual="$(sha256sum "$installer" | awk '{print $1}')"
          if [[ "$actual" != "$expected" ]]; then
            echo "Installer checksum mismatch." >&2
            echo "Expected: $expected" >&2
            echo "Actual:   $actual" >&2
            exit 1
          fi

          echo "Validated $installer ($actual)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "installer_path=$installer" >> "$GITHUB_OUTPUT"
          echo "checksum_path=$checksum" >> "$GITHUB_OUTPUT"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: zotero-linker-installer
          path: |
            ${{ steps.validate.outputs.installer_path }}
            ${{ steps.validate.outputs.checksum_path }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: validate-installer
    if: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_assets) }}
    steps:
      - name: Checkout release notes
        uses: actions/checkout@v4

      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: zotero-linker-installer
          path: publish-assets

      - name: List release assets
        shell: bash
        run: find publish-assets -type f -maxdepth 3 -print

      - name: Prepare release upload directory
        shell: bash
        run: |
          set -euo pipefail
          rm -rf publish-assets-flat
          mkdir -p publish-assets-flat
          find publish-assets -type f -name "ZoteroLinkerSetup-${{ needs.validate-installer.outputs.version }}.exe" -exec cp -v {} publish-assets-flat/ \;
          find publish-assets -type f -name "ZoteroLinkerSetup-${{ needs.validate-installer.outputs.version }}.exe.sha256" -exec cp -v {} publish-assets-flat/ \;
          test -f "publish-assets-flat/ZoteroLinkerSetup-${{ needs.validate-installer.outputs.version }}.exe"
          test -f "publish-assets-flat/ZoteroLinkerSetup-${{ needs.validate-installer.outputs.version }}.exe.sha256"
          cp -v "publish-assets-flat/ZoteroLinkerSetup-${{ needs.validate-installer.outputs.version }}.exe" "publish-assets-flat/ZoteroLinkerSetup.exe"
          latest_hash="$(sha256sum "publish-assets-flat/ZoteroLinkerSetup.exe" | awk '{print $1}')"
          printf "%s  ZoteroLinkerSetup.exe\n" "$latest_hash" > "publish-assets-flat/ZoteroLinkerSetup.exe.sha256"

      - name: Prepare release notes
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          RELEASE_VERSION: ${{ needs.validate-installer.outputs.version }}
        run: |
          set -euo pipefail
          notes_file="release-notes/${RELEASE_TAG}.md"
          if [[ -f "$notes_file" ]]; then
            cp "$notes_file" release-notes-body.md
          else
            cat > release-notes-body.md <<EOF
          # Zotero Linker ${RELEASE_VERSION}

          ## 中文

          本次发布包含 Windows 安装包更新。

          ## English

          This release contains an updated Windows installer.
          EOF
          fi

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          name: Zotero Linker ${{ needs.validate-installer.outputs.version }}
          files: |
            publish-assets-flat/ZoteroLinkerSetup-${{ needs.validate-installer.outputs.version }}.exe
            publish-assets-flat/ZoteroLinkerSetup-${{ needs.validate-installer.outputs.version }}.exe.sha256
            publish-assets-flat/ZoteroLinkerSetup.exe
            publish-assets-flat/ZoteroLinkerSetup.exe.sha256
          body_path: release-notes-body.md
